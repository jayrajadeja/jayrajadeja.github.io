name: Lighthouse CI

# Informational only — audits the static build (perf / a11y / best-practices /
# SEO) and posts a temporary report link. Assertions are "warn" level and the
# step is continue-on-error, so this never blocks a merge or deploy.

on:
  push:
    branches: [master]
  pull_request:
  workflow_dispatch:

jobs:
  lighthouse:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Build static site
        run: npm run build

      - name: Run Lighthouse CI
        uses: treosh/lighthouse-ci-action@v12
        with:
          configPath: ./lighthouserc.json
          temporaryPublicStorage: true
        continue-on-error: true
